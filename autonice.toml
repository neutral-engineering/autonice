# autonice rules: <match-key> = <nice value>  (-20 highest prio .. 19 lowest)
#
# A key matches the exec'd binary's basename. To also match any substring of the
# full path, opt in with the table form: <key> = { nice = <n>, substring = true }
# (basename matching is the default, so e.g. `dd` won't catch `ssh-add`).
#
# Positive nice (deprioritize) needs no privilege; negative nice (prioritize) or
# reniceing processes you don't own requires CAP_SYS_NICE (run as root).

# Renice each listed root and its ENTIRE process subtree to `nice`. `cargo`
# catches rustc / build scripts / cc / ld; `make` catches sub-makes / cmake /
# compilers. Tracked by parent pid (seeded race-free at fork), so only
# descendants of a root match — standalone rustc/cc/cmake are left to [rules].
# Remove this table to disable.
[subtree]
nice = 19
roots = ["cargo", "make"]

# Deprioritize heavy background work (single binaries).
[rules]
dd = 19
ffmpeg = 15
gcc = 19
"g++" = 19
"c++" = 13
cmake = 11

# Prioritize latency-sensitive things (needs CAP_SYS_NICE).
# pipewire = -10
